<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>AfriSpeak AI</title>
<meta name="theme-color" content="#D4A017"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="AfriSpeak"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>

.install-top-btn{
  display:none;align-items:center;gap:5px;
  background:var(--accent);color:var(--bg);border:none;
  border-radius:var(--rf);padding:5px 11px;font-size:11px;font-weight:700;
  cursor:pointer;animation:pulse-gold 2s infinite;
}
@keyframes pulse-gold{0%,100%{box-shadow:0 0 0 0 rgba(212,160,23,.4)}50%{box-shadow:0 0 0 6px rgba(212,160,23,0)}}

/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root{
  --bg:#0d0d0d;--surf:#161616;--surf2:#1f1f1f;--surf3:#2a2a2a;
  --border:#2e2e2e;--text:#f0f0f0;--muted:#666;
  --accent:#D4A017;--accent-bg:#2a2000;--accent-dim:#b38a12;
  --ub:#D4A017;--ut:#0d0d0d;--bb:#1e1e1e;--bt:#f0f0f0;
  --green:#22c55e;--red:#ef4444;--purple:#a855f7;
  --r:13px;--rsm:9px;--rf:9999px;
  --sb:220px;--topbar:52px;
}
.light{
  --bg:#f2f2f2;--surf:#fff;--surf2:#f0f0f0;--surf3:#e4e4e4;
  --border:#e0e0e0;--text:#111;--muted:#999;
  --accent:#1B4332;--accent-bg:#e8f5e9;--accent-dim:#145c2a;
  --ub:#1B4332;--ut:#fff;--bb:#fff;--bt:#111;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);transition:background .2s,color .2s}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,textarea,select{font-family:inherit;outline:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ═══════════════════════════════════════════
   APP SHELL — DESKTOP
═══════════════════════════════════════════ */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.topbar{
  height:var(--topbar);padding:0 14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surf);border-bottom:1px solid var(--border);z-index:30;
  position:relative;
}
.layout{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{
  width:var(--sb);flex-shrink:0;background:var(--surf);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  overflow:hidden;transition:transform .25s ease;z-index:20;
}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ═══════════════════════════════════════════
   MOBILE — sidebar becomes a drawer
═══════════════════════════════════════════ */
@media(max-width:640px){
  :root{--topbar:48px}
  .sidebar{
    position:fixed;top:var(--topbar);left:0;bottom:0;
    width:80vw;max-width:280px;
    transform:translateX(-100%);
    box-shadow:4px 0 20px rgba(0,0,0,.5);
  }
  .sidebar.open{transform:translateX(0)}
  .sb-overlay{
    display:none;position:fixed;inset:0;top:var(--topbar);
    background:rgba(0,0,0,.5);z-index:19;
  }
  .sb-overlay.show{display:block}
  .main{width:100%}
  .menu-btn{display:flex !important}
}
.menu-btn{
  display:none;align-items:center;justify-content:center;
  width:34px;height:34px;background:var(--surf2);border:1px solid var(--border);
  border-radius:var(--rsm);font-size:16px;flex-shrink:0;
}
.sb-overlay{display:none}

/* ═══════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════ */
.logo{display:flex;align-items:center;gap:7px}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.logo-text{font-size:15px;font-weight:700;letter-spacing:-.4px}
.logo-ai{font-size:9px;background:var(--accent);color:var(--bg);padding:2px 6px;border-radius:var(--rf);font-weight:700}
.plan-btn{font-size:10px;padding:3px 9px;border-radius:var(--rf);font-weight:700;cursor:pointer;border:none;transition:all .15s}
.plan-free{background:var(--surf2);color:var(--muted);border:1px solid var(--border)}
.plan-pro{background:linear-gradient(135deg,#a855f7,#6366f1);color:#fff}
.tr{display:flex;align-items:center;gap:6px}
.pill{background:var(--surf2);border:1px solid var(--border);border-radius:var(--rf);padding:4px 10px;font-size:11px;color:var(--text);cursor:pointer}
.pill:hover{background:var(--surf3)}
.xp-pill{font-size:11px;font-weight:700;color:var(--accent)}
.st-pill{font-size:11px;font-weight:700}
.uchip{display:flex;align-items:center;gap:5px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--rf);padding:3px 9px 3px 3px;cursor:pointer}
.uav{width:22px;height:22px;border-radius:50%;overflow:hidden;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--bg);flex-shrink:0}
.uav img{width:100%;height:100%;object-fit:cover}
.nudge{font-size:10px;color:var(--accent);background:var(--accent-bg);border:1px solid var(--accent);border-radius:var(--rf);padding:4px 9px;cursor:pointer}
@media(max-width:380px){
  .xp-pill,.st-pill{display:none}
  .logo-text{font-size:14px}
}

/* ═══════════════════════════════════════════
   HOME SIDEBAR
═══════════════════════════════════════════ */
.sb-sec{padding:12px 11px 5px;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.9px;text-transform:uppercase}
.lang-list{flex:1;overflow-y:auto;padding:0 7px 7px;-webkit-overflow-scrolling:touch}
.lang-card{
  display:flex;align-items:center;gap:9px;padding:11px 10px;
  border-radius:10px;cursor:pointer;margin-bottom:3px;transition:all .15s;position:relative;
}
.lang-card:hover,.lang-card:active{background:var(--surf2)}
.lang-card.active{background:var(--accent)}
.lang-card.active .lc-name{color:var(--bg);font-weight:700}
.lang-card.active .lc-sub,.lang-card.active .lc-arr{color:rgba(0,0,0,.4)}
.lc-flag{font-size:22px;flex-shrink:0}
.lc-info{flex:1;min-width:0}
.lc-name{font-size:13px;font-weight:500;color:var(--text)}
.lc-sub{font-size:10px;color:var(--muted);margin-top:1px}
.lc-arr{font-size:14px;color:var(--muted);flex-shrink:0}
.lc-lvl{font-size:9px;background:var(--accent-bg);color:var(--accent);padding:1px 6px;border-radius:var(--rf);font-weight:700;flex-shrink:0}
.lang-card.active .lc-lvl{background:rgba(0,0,0,.2);color:var(--bg)}
.sb-div{height:1px;background:var(--border);margin:5px 8px}
.sb-link{
  display:flex;align-items:center;gap:9px;padding:10px 10px;margin:0 7px 2px;
  border-radius:9px;cursor:pointer;font-size:13px;color:var(--muted);
  transition:all .15s;background:none;border:none;width:calc(100% - 14px);text-align:left;
}
.sb-link:hover,.sb-link.active{background:var(--surf2);color:var(--text);font-weight:500}
.sb-link svg{width:15px;height:15px;fill:currentColor;flex-shrink:0}
.sb-bottom{padding:8px}

/* ═══════════════════════════════════════════
   LANG SIDEBAR
═══════════════════════════════════════════ */
.lsh{padding:13px 11px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.lsh-back{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer;margin-bottom:10px;transition:color .15s}
.lsh-back:hover{color:var(--text)}
.lsh-lang{display:flex;align-items:center;gap:8px}
.lsh-flag{font-size:24px}
.lsh-name{font-size:14px;font-weight:700}
.lsh-lvl{font-size:10px;color:var(--muted);margin-top:1px}
.lsh-bar{height:4px;background:var(--surf2);border-radius:var(--rf);margin-top:8px;overflow:hidden}
.lsh-fill{height:100%;background:var(--accent);border-radius:var(--rf);transition:width .4s}
.lnav{flex:1;overflow-y:auto;padding:7px;-webkit-overflow-scrolling:touch}
.ltab{
  display:flex;align-items:center;gap:9px;padding:11px 10px;border-radius:9px;
  cursor:pointer;font-size:13px;color:var(--muted);background:none;border:none;
  width:100%;text-align:left;transition:all .15s;margin-bottom:2px;
}
.ltab:hover,.ltab.active{background:var(--surf2);color:var(--text);font-weight:500}
.ltab svg{width:15px;height:15px;fill:currentColor;flex-shrink:0}
.ltab .tag{margin-left:auto;font-size:9px;color:var(--accent);font-weight:700}

/* ═══════════════════════════════════════════
   CHAT
═══════════════════════════════════════════ */
.chat-hdr{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-bottom:1px solid var(--border);background:var(--surf);flex-shrink:0;
}
.ch-av{width:34px;height:34px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ch-name{font-size:13px;font-weight:600}
.ch-st{font-size:10px;color:var(--green);display:flex;align-items:center;gap:3px;margin-top:1px}
.dot{width:5px;height:5px;background:var(--green);border-radius:50%;flex-shrink:0}
.chat-area{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;-webkit-overflow-scrolling:touch}
.msg-row{display:flex;flex-direction:column;gap:2px}
.msg-row.user{align-items:flex-end}
.msg-row.bot{align-items:flex-start}
.bubble-wrap{display:flex;flex-direction:column;gap:3px;max-width:85%}
@media(max-width:640px){.bubble-wrap{max-width:92%}}
.bubble-local{
  background:var(--bb);color:var(--bt);border:1px solid var(--border);
  border-radius:15px 15px 4px 15px;padding:10px 13px;
  font-size:14px;font-weight:600;line-height:1.55;word-break:break-word;
}
.bubble-en{
  background:var(--surf2);color:var(--muted);border:1px solid var(--border);
  border-radius:4px 4px 15px 15px;padding:7px 12px;
  font-size:12px;font-style:italic;line-height:1.5;word-break:break-word;
}
.user-bubble{
  background:var(--ub);color:var(--ut);border-radius:15px 15px 4px 15px;
  padding:10px 13px;max-width:85%;font-size:13px;line-height:1.55;word-break:break-word;
}
@media(max-width:640px){.user-bubble{max-width:92%}}
.msg-meta{display:flex;align-items:center;gap:5px;padding:0 3px;margin-top:1px;flex-wrap:wrap}
.msg-time{font-size:9px;color:var(--muted)}
.spk-btn{
  background:none;border:1px solid var(--border);font-size:10px;color:var(--muted);
  padding:3px 9px;border-radius:var(--rf);line-height:1.4;display:flex;align-items:center;gap:3px;transition:all .15s;
}
.spk-btn:hover{border-color:var(--accent);color:var(--accent)}
.spk-btn.playing{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.typing{display:flex;gap:4px;padding:3px 0}
.typing span{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:bo .9s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bo{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}
.input-area{
  padding:10px 12px;border-top:1px solid var(--border);background:var(--surf);
  display:flex;gap:7px;align-items:center;flex-shrink:0;
}
.msg-input{
  flex:1;background:var(--surf2);border:1px solid var(--border);border-radius:var(--rf);
  padding:10px 14px;font-size:14px;color:var(--text);transition:border .15s;min-width:0;
}
.msg-input:focus{border-color:var(--accent)}
.msg-input::placeholder{color:var(--muted)}
.mic-btn{
  width:36px;height:36px;border-radius:50%;background:var(--surf2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:all .15s;
}
.mic-btn:hover{border-color:var(--accent)}
.mic-btn.rec{background:var(--red);border-color:var(--red);animation:pu 1s infinite}
@keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.send-btn{
  width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;
  align-items:center;justify-content:center;flex-shrink:0;font-size:15px;color:var(--bg);transition:opacity .15s;
}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.vbar{display:none;align-items:center;gap:7px;padding:6px 14px;background:rgba(239,68,68,.08);border-top:1px solid rgba(239,68,68,.2);font-size:11px;color:var(--red);flex-shrink:0}
.vbar.on{display:flex}
.vdot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pu 1s infinite}

/* ═══════════════════════════════════════════
   INNER SCREENS
═══════════════════════════════════════════ */
.inner{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;-webkit-overflow-scrolling:touch}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:13px}
.clabel{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px}
.tc-sel{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:var(--rsm);padding:9px 11px;color:var(--text);font-size:13px}
.tc-sel:focus{border-color:var(--accent)}
.tc-ta{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 11px;color:var(--text);font-size:14px;resize:none;height:90px;line-height:1.5}
.tc-ta:focus{border-color:var(--accent)}
.res-box{background:var(--surf2);border-radius:var(--rsm);padding:11px;font-size:13px;min-height:64px;line-height:1.6;color:var(--text)}
.swap-row{display:flex;gap:7px;align-items:center}
.swap-row select{flex:1}
.swap-btn{background:var(--surf2);border:1px solid var(--border);border-radius:var(--rsm);padding:9px 11px;color:var(--text);font-size:14px;transition:all .15s}
.swap-btn:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.act-btn{width:100%;background:var(--accent);color:var(--bg);border:none;border-radius:var(--rsm);padding:12px;font-size:14px;font-weight:700;transition:opacity .15s}
.act-btn:hover{opacity:.88}
.act-btn:disabled{opacity:.5;cursor:not-allowed}
.phrase-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:13px;cursor:pointer;transition:border-color .15s}
.phrase-card:hover{border-color:var(--accent)}
.pc-en{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px}
.pc-lo{font-size:15px;font-weight:600}
.pc-pr{font-size:11px;color:var(--accent);margin-top:3px;font-style:italic}
.dashed{background:var(--surf);border:1.5px dashed var(--border);border-radius:var(--r);padding:13px;font-size:13px;color:var(--muted);text-align:center;font-family:inherit;width:100%;transition:all .15s}
.dashed:hover{border-color:var(--accent);color:var(--text)}
.dashed:disabled{opacity:.5;cursor:not-allowed}

/* ═══════════════════════════════════════════
   GOALS
═══════════════════════════════════════════ */
.goals-section{display:flex;flex-direction:column;gap:8px}
.goal-item{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:13px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.goal-item::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--border);border-radius:2px 0 0 2px;transition:background .2s}
.goal-item.active::before{background:var(--accent)}
.goal-item:hover{border-color:var(--accent)}
.goal-item.done{border-color:var(--green);opacity:.75}
.goal-item.done::before{background:var(--green)}
.gi-ring{width:44px;height:44px;flex-shrink:0;position:relative}
.gi-ring svg{width:44px;height:44px;transform:rotate(-90deg)}
.gi-ring .track{fill:none;stroke:var(--surf2);stroke-width:3}
.gi-ring .fill{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .4s}
.gi-ring.done .fill{stroke:var(--green)}
.gi-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.gi-body{flex:1;min-width:0}
.gi-title{font-size:12px;font-weight:600}
.gi-sub{font-size:10px;color:var(--muted);margin-top:2px}
.gi-xp{font-size:10px;font-weight:700;color:var(--accent)}
.gi-sel{font-size:9px;background:var(--accent-bg);color:var(--accent);padding:2px 7px;border-radius:var(--rf);font-weight:700;flex-shrink:0}
.goal-item.done .gi-xp{color:var(--green)}
.add-goal-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--surf2);border:1.5px dashed var(--border);border-radius:var(--r);padding:11px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s}
.add-goal-btn:hover{border-color:var(--accent);color:var(--text)}
.goal-picker{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:13px;display:flex;flex-direction:column;gap:7px}
.gp-item{display:flex;align-items:center;gap:10px;padding:11px;border-radius:var(--rsm);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.gp-item:hover,.gp-item.picked{border-color:var(--accent);background:var(--accent-bg)}
.gp-ico{font-size:20px;flex-shrink:0}
.gp-t{font-size:12px;font-weight:600}
.gp-s{font-size:10px;color:var(--muted);margin-top:1px}
.gp-xp{font-size:10px;font-weight:700;color:var(--accent);margin-left:auto;flex-shrink:0}

/* ═══════════════════════════════════════════
   LESSONS
═══════════════════════════════════════════ */
.lesson-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:13px;cursor:pointer;display:flex;align-items:center;gap:11px;transition:all .15s}
.lesson-card:hover:not(.locked){border-color:var(--accent);background:var(--surf2)}
.lesson-card.done{border-color:var(--green)}
.lesson-card.locked{opacity:.5;cursor:not-allowed}
.ln{width:36px;height:36px;border-radius:50%;background:var(--surf2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.lesson-card.done .ln{background:var(--green);border-color:var(--green);color:#fff}
.lesson-card.unlocked .ln{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.lb{flex:1;min-width:0}
.lt{font-size:13px;font-weight:600}
.ls{font-size:10px;color:var(--muted);margin-top:2px}
.lxp{font-size:10px;color:var(--accent);font-weight:700;flex-shrink:0}
.prog-bar{height:4px;background:var(--surf2);border-radius:var(--rf);overflow:hidden;margin-top:5px}
.prog-fill{height:100%;background:var(--accent);border-radius:var(--rf);transition:width .4s}

/* ═══════════════════════════════════════════
   QUIZ
═══════════════════════════════════════════ */
.quiz-shell{flex:1;display:flex;flex-direction:column;overflow:hidden}
.qtop{padding:12px 14px;background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0}
.qprog{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.qstep{font-size:11px;color:var(--muted);white-space:nowrap}
.qbar{flex:1;height:5px;background:var(--surf2);border-radius:var(--rf);overflow:hidden}
.qfill{height:100%;background:var(--accent);border-radius:var(--rf);transition:width .3s}
.qsc{font-size:11px;font-weight:700;color:var(--accent);white-space:nowrap}

  addXP(n){this.xp+=n;UI.toast("+"+n+" XP 🌟");this.save();if(S._db&&S.user)this.save();},
  lvl(lk){return LEVELS[this.progress[lk]?.level||0];},
  pct(lk){return Math.min(100,Math.round(((this.progress[lk]?.done||[]).length/5)*100));},
  msgs(lk){return(this.histories[lk]||[]).filter(m=>m.role==="user").length;},
  allMsgs(){return Object.keys(LANGS).reduce((a,k)=>a+this.msgs(k),0);},
  allLessons(){return Object.keys(LANGS).reduce((a,k)=>a+(this.progress[k]?.done||[]).length,0);},
  doneLesson(lk,i){
    const p=this.progress[lk];
    if(!p.done.includes(i))p.done.push(i);
    if(p.done.length>=5)p.level=Math.min(4,p.level+1);
    this.addXP(CFG.xpLesson);this.save();
  },
  goalProgress(gid,lk){
    const g=ALL_GOALS.find(x=>x.id===gid);if(!g)return{val:0,max:1,pct:0,done:false};
    const today=new Date().toDateString();
    let val=0;
    if(g.type==="lesson") val=(this.progress[lk]?.done||[]).length>0?1:0;
    else if(g.type==="msgs") val=this.msgs(lk);
    else if(g.type==="quiz") val=parseInt(localStorage.getItem("as_qt_"+today)||0);
    else if(g.type==="perfect") val=parseInt(localStorage.getItem("as_qp_"+today)||0);
    else if(g.type==="streak") val=this.streak>0?1:0;
    else if(g.type==="phrases") val=this.phrases.length>0?1:0;
    else if(g.type==="trans") val=this.transHistory.filter(h=>{try{return new Date(h.date).toDateString()===today;}catch{return false;}}).length>0?1:0;
    else if(g.type==="voice") val=this.voiceCnt;
    else if(g.type==="all_lessons") val=(this.progress[lk]?.done||[]).length;
    const max=g.target;const pct=Math.min(100,Math.round((val/max)*100));
    return{val:Math.min(val,max),max,pct,done:val>=max};
  }
};

/* ════════ PARSE BOT RESPONSE ════════ */
function parseResponse(text){
  const localMatch=text.match(/\[LOCAL\]:\s*([\s\S]*?)(?=\[EN\]:|$)/i);
  const enMatch=text.match(/\[EN\]:\s*([\s\S]*?)$/i);
  if(localMatch&&enMatch){
    return{local:localMatch[1].trim(),en:enMatch[1].trim()};
  }
  // fallback: check for bracket pattern
  const bracketMatch=text.match(/^(.*?)\s*[\(\[](.*?)[\)\]]\s*$/s);
  if(bracketMatch)return{local:bracketMatch[1].trim(),en:bracketMatch[2].trim()};
  return{local:text,en:null};
}

const AI={
  async _call(sys,msgs,max=1000){
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CFG.model}:generateContent?key=${S.geminiKey}`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system_instruction:{parts:[{text:sys}]},contents:msgs.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]})),generationConfig:{temperature:.7,maxOutputTokens:max}})
    });
    const d=await r.json();if(d.error)throw new Error(d.error.message);
    return d.candidates[0].content.parts[0].text;
  },
  chat(msgs,lk){return this._call(LANGS[lk].sys,msgs,1000);},
  translate(text,from,to){return this._call(`Expert African language translator. Translate from ${from} to ${to}. Return ONLY the translation.`,[{role:"user",content:text}],500);},
  async phrases(langName){
    const raw=await this._call("Return ONLY valid JSON array, no markdown.",[{role:"user",content:`7 practical everyday phrases in ${langName}. Format:[{"english":"...","local":"...","pronunciation":"..."}]`}],800);
    return JSON.parse(raw.replace(/```json|```/g,"").trim());
  },
  async lesson(langName,num,level){
    const raw=await this._call("Return ONLY valid JSON, no markdown.",[{role:"user",content:`Create ${langName} lesson on "${TOPICS[(num-1)%TOPICS.length]}" for ${level} level. JSON: {"topic":"...","phrases":[{"english":"...","local":"...","pronunciation":"..."}],"culturalNote":"..."} — exactly 5 phrases.`}],1000);
    return JSON.parse(raw.replace(/```json|```/g,"").trim());
  },
  async quiz(langName,lessonData){
    const raw=await this._call("Return ONLY valid JSON array, no markdown.",[{role:"user",content:`5-question quiz on ${langName} using: ${JSON.stringify(lessonData.phrases)}. Return:[{"type":"mcq","question":"...","options":["...","...","...","..."],"answer":"..."},{"type":"type","question":"...","answer":"..."}] alternating mcq/type, exactly 5 questions.`}],1200);
    return JSON.parse(raw.replace(/```json|```/g,"").trim());
  }
};

/* ════════ VOICE SERVICE ════════ */
const Voice={
  _r:null,_s:window.speechSynthesis,_current:null,
  start(lk,onR,onE){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){UI.toast("Voice not supported on this browser",true);return;}
    this._r=new SR();this._r.lang=LANGS[lk]?.vl||"en-US";
    this._r.onresult=e=>onR(e.results[0][0].transcript);
    this._r.onend=onE;this._r.onerror=e=>{UI.toast("Voice error: "+e.error,true);onE();};
    this._r.start();
  },
  stop(){if(this._r){this._r.stop();this._r=null;}},
  /* Toggle speak — if already speaking this text, stop. Otherwise speak. */
  toggle(text,lk,btn){
    if(this._current===btn){
      // stop
      this._s.cancel();
      this._current=null;
      document.querySelectorAll(".spk-btn.playing").forEach(b=>{b.classList.remove("playing");b.innerHTML="🔊 Play";});
      return;
    }
    // stop any current
    this._s.cancel();
    document.querySelectorAll(".spk-btn.playing").forEach(b=>{b.classList.remove("playing");b.innerHTML="🔊 Play";});
    this._current=btn;
    const u=new SpeechSynthesisUtterance(text);
    u.lang=LANGS[lk]?.vl||"en-US";u.rate=.9;
    if(btn){
      btn.classList.add("playing");btn.innerHTML="⏹ Stop";
      u.onend=u.onerror=()=>{btn.classList.remove("playing");btn.innerHTML="🔊 Play";this._current=null;};
    }
    this._s.speak(u);
  }
};

    if(pass){
      S.doneLesson(S.lang,lessonIdx);
      localStorage.setItem("as_qt_"+new Date().toDateString(),"1");
    }
    if(pct===100){S.perfectCnt++;localStorage.setItem("as_qp_"+new Date().toDateString(),"1");S.save();}
    S.addXP(xpEarned);
    document.getElementById("main").innerHTML=`<div class="qresult">
      <div class="qr-ico">${icon}</div>
      <div class="qr-t">${pct===100?"Perfect!":pass?"Lesson passed!":"Keep going!"}</div>

      <div class="qr-btns">

      </div>

/* ════════ QUIZ CONTROLLER ════════ */
const Quiz={
  ans(chosen,correct){
    if(S.quiz.answered)return;S.quiz.answered=true;
    const ok=chosen.trim().toLowerCase()===correct.trim().toLowerCase();
    if(ok)S.quiz.score++;
    document.querySelectorAll(".qopt").forEach(b=>{
      b.disabled=true;
      if(b.textContent.trim()===correct.trim())b.classList.add("ok");
      else if(b.textContent.trim()===chosen.trim()&&!ok)b.classList.add("no");
    });
    this._fb(ok,correct);
  },
  check(){
    if(S.quiz.answered)return;
    const inp=document.getElementById("qinp");if(!inp)return;
    const val=inp.value.trim();const correct=S.quiz.questions[S.quiz.cur].answer;
    const ok=val.toLowerCase()===correct.toLowerCase();
    if(ok)S.quiz.score++;S.quiz.answered=true;inp.disabled=true;this._fb(ok,correct);
  },
  _fb(ok,correct){
    const fb=document.getElementById("qfb");if(!fb)return;
    fb.innerHTML=`<div class="qfb ${ok?"ok":"no"}">${ok?"✅ Correct! Well done!":"❌ Answer: <strong>"+correct+"</strong>"}</div>
      <button class="qnext" onclick="Quiz.next()">${S.quiz.cur+1<S.quiz.questions.length?"Next →":"See results 🎉"}</button>`;
  },
  next(){
    S.quiz.answered=false;S.quiz.cur++;
    if(S.quiz.cur>=S.quiz.questions.length)UI.showQuizResult(S.quiz.score,S.quiz.questions.length,S.quiz.lessonIdx);
    else UI._quizQ();
  }
};

  closeSidebar(){
    document.getElementById("sidebar")?.classList.remove("open");
    document.getElementById("sb-overlay")?.classList.remove("show");
  },
  _afterNav(){
    // auto-close sidebar on mobile after navigation
    if(window.innerWidth<=640) this.closeSidebar();
  },
  go(screen){S.screen=screen;S.lang=null;UI.all();this._afterNav();},
  goHome(){S.screen="home";S.lang=null;UI.all();this._afterNav();},
  enterLang(lk){S.lang=lk;S.screen="lang";S.ltab="chat";S.phrases=[];UI.all();this._afterNav();},
  ltab(t){S.ltab=t;UI.sidebar();UI.main();this._afterNav();},
  saveKey(){
    const v=document.getElementById("kf")?.value.trim();
    if(!v){document.getElementById("kerr").textContent="Please paste your API key.";return;}
    if(v.length<20){document.getElementById("kerr").textContent="Key seems too short.";return;}
    S.geminiKey=v;localStorage.setItem("as_k",v);S.screen="home";UI.all();
  },
  usePhrase(phrase){S.ltab="chat";UI.sidebar();UI.main();setTimeout(()=>{const i=document.getElementById("inp");if(i){i.value=phrase;i.focus();}},100);},
  toggleVoice(){
    const mic=document.getElementById("mic");const bar=document.getElementById("vbar");
    if(S.isRec){Voice.stop();S.isRec=false;mic?.classList.remove("rec");bar?.classList.remove("on");}
    else{
      S.isRec=true;mic?.classList.add("rec");bar?.classList.add("on");S.voiceCnt++;S.save();
      Voice.start(S.lang,text=>{const i=document.getElementById("inp");if(i)i.value=text;},
        ()=>{S.isRec=false;document.getElementById("mic")?.classList.remove("rec");document.getElementById("vbar")?.classList.remove("on");});
    }
  },
  async send(){
    const inp=document.getElementById("inp");const btn=document.getElementById("sbtn");
    const text=inp?.value.trim();if(!text)return;
    inp.value="";btn.disabled=true;
    const hist=S.histories[S.lang];
    hist.push({role:"user",content:text,time:UI.t(),date:new Date().toISOString()});
    UI.showTyping();
    try{
      const reply=await AI.chat(hist,S.lang);
      hist.push({role:"assistant",content:reply,time:UI.t(),date:new Date().toISOString()});
      if(hist.length>CFG.maxMsgs)hist.splice(0,hist.length-CFG.maxMsgs);
      S.save();UI._msgs();
    }catch(e){
      hist.push({role:"assistant",content:`[LOCAL]: Error\n[EN]: ${e.message}`,time:UI.t(),date:new Date().toISOString()});
      UI._msgs();
    }
    btn.disabled=false;document.getElementById("inp")?.focus();
  },
  openGoalPicker(){S.showGoalPicker=true;UI.main();document.querySelector(".goal-picker")?.scrollIntoView({behavior:"smooth"});},
  closeGoalPicker(){S.showGoalPicker=false;S.save();UI.main();},

    if(S.selectedGoals.includes(id))S.selectedGoals=S.selectedGoals.filter(g=>g!==id);

          <div><div style="font-size:14px;font-weight:700">Lesson ${idx+1}: ${data.topic}</div>
          <div style="font-size:10px;color:var(--muted)">${LANGS[S.lang].name} · ${S.lvl(S.lang)}</div></div>
          <button class="act-btn" style="width:auto;padding:8px 15px;font-size:12px" onclick="App.startQuiz(${idx})">Take Quiz →</button>
        </div>
        ${(data.phrases||[]).map(p=>`
          <div class="phrase-card">
            <div class="pc-en">${p.english||""}</div>
            <div class="pc-lo">${p.local||""}</div>
            ${p.pronunciation?`<div class="pc-pr">~ ${p.pronunciation}</div>`:""}
            <button class="spk-btn" style="margin-top:7px" onclick="Voice.toggle('${(p.local||"").replace(/'/g,"\\'").replace(/"/g,"&quot;")}','${S.lang}',this)">🔊 Play</button>
          </div>`).join("")}
        ${data.culturalNote?`<div class="card" style="border-color:var(--accent)"><div class="clabel">Cultural Note</div><div style="font-size:12px;line-height:1.65">${data.culturalNote}</div></div>`:""}
        <button class="act-btn" onclick="App.startQuiz(${idx})">Take quiz on this lesson →</button>
      </div>`;
    }catch(e){
      m.innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-t">Failed to load</div><div class="empty-s">${e.message}</div><button class="lock-btn" onclick="App.ltab('lessons')">Go back</button></div>`;
    }
  },
  async startQuiz(lessonIdx){
    const m=document.getElementById("main");
    m.innerHTML=`<div class="empty"><div class="empty-ico">🎯</div><div class="empty-t">Building your quiz...</div><div class="empty-s">Creating personalised questions</div></div>`;
    try{
      const data=S.curLesson||{phrases:[{english:"Hello",local:"Oli otya",pronunciation:"oh-lee oh-chah"}]};
      const questions=await AI.quiz(LANGS[S.lang].name,data);
      UI.showQuiz(questions,lessonIdx);
    }catch(e){
      m.innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-t">Failed to build quiz</div><div class="empty-s">${e.message}</div><button class="lock-btn" onclick="App.startLesson(${lessonIdx})">Back to lesson</button></div>`;
    }
  }
};

/* ════════ TRANSLATE / PHRASES ════════ */
const Trans={
  swap(){const f=document.getElementById("fl"),t=document.getElementById("tl"),tmp=f.value;f.value=t.value;t.value=tmp;},
  async go(){
    const from=document.getElementById("fl").value,to=document.getElementById("tl").value;
    const text=document.getElementById("ti").value.trim();
    const btn=document.getElementById("tbtn"),res=document.getElementById("tres");
    if(!text)return;
    btn.disabled=true;btn.textContent="Translating...";
    res.style.fontStyle="italic";res.style.color="var(--muted)";res.textContent="Translating...";
    const fn=from==="english"?"English":LANGS[from]?.name||from;
    const tn=to==="english"?"English":LANGS[to]?.name||to;
    try{
      const reply=await AI.translate(text,fn,tn);
      res.style.fontStyle="normal";res.style.color="var(--text)";res.textContent=reply;
      S.transHistory.unshift({original:text,result:reply,fromName:fn,toName:tn,time:UI.t(),date:new Date().toISOString()});
      if(S.transHistory.length>CFG.maxMsgs)S.transHistory=S.transHistory.slice(0,CFG.maxMsgs);
      S.save();
    }catch(e){res.style.color="var(--red)";res.textContent="Error: "+e.message;}
    btn.disabled=false;btn.textContent="Translate now";
  }
};
const Phrases={
  async gen(){
    const btn=document.getElementById("gbtn"),c=document.getElementById("pc");
    btn.disabled=true;btn.textContent="Generating...";
    c.innerHTML=`<div style="text-align:center;padding:26px;font-size:12px;color:var(--muted)">Loading...</div>`;
    try{
      S.phrases=await AI.phrases(LANGS[S.lang].name);
      c.innerHTML=S.phrases.map(p=>`<div class="phrase-card" onclick="App.usePhrase(this.dataset.e)" data-e="${(p.english||"").replace(/"/g,"&quot;")}">
        <div class="pc-en">${p.english||""}</div><div class="pc-lo">${p.local||""}</div>
        ${p.pronunciation?`<div class="pc-pr">~ ${p.pronunciation}</div>`:""}
        <button class="spk-btn" style="margin-top:6px" onclick="event.stopPropagation();Voice.toggle('${(p.local||"").replace(/'/g,"\\'").replace(/"/g,"&quot;")}','${S.lang}',this)">🔊 Play</button>
      </div>`).join("");
    }catch(e){c.innerHTML=`<div style="color:var(--red);font-size:12px;text-align:center;padding:18px">Error: ${e.message}</div>`;}
    btn.disabled=false;btn.textContent="+ Generate new phrases";
  }
};

/* ════════ BOOTSTRAP ════════ */
(function(){
  S.init();
  let fb=false;

    if(CFG.firebase.apiKey&&!CFG.firebase.apiKey.includes("YOUR_")){

/* ════════ PWA ════════ */
let _installPrompt = null;
let _swReady = false;

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js', {scope: '/'})
    .then(reg => {
      _swReady = true;
      console.log('[SW] registered', reg.scope);
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data?.type === 'SYNC_DATA') S.save();
      });
    })
    .catch(e => console.warn('[SW] failed', e));
}

// Capture install prompt — fires when PWA criteria met
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  console.log('[PWA] install prompt captured');
  // Show banner
  if (!localStorage.getItem('as_pwa_ok')) {
    setTimeout(() => document.getElementById('pwa-banner')?.classList.add('show'), 1500);
  }
  // Show install button in topbar
  const ib = document.getElementById('install-top-btn');
  if (ib) ib.style.display = 'flex';
});

window.addEventListener('appinstalled', () => {
  _installPrompt = null;
  document.getElementById('pwa-banner')?.classList.remove('show');
  const ib = document.getElementById('install-top-btn');
  if (ib) ib.style.display = 'none';
  localStorage.setItem('as_pwa_ok', '1');
  UI.toast('AfriSpeak installed on your device! 🎉');
});

// Install button handler
function triggerInstall() {
  if (_installPrompt) {
    _installPrompt.prompt();
    _installPrompt.userChoice.then(r => {
      console.log('[PWA] choice:', r.outcome);
      _installPrompt = null;
      document.getElementById('pwa-banner')?.classList.remove('show');
      const ib = document.getElementById('install-top-btn');
      if (ib) ib.style.display = 'none';
    });
  } else {
    // Fallback instructions
    const ua = navigator.userAgent.toLowerCase();
    if (/iphone|ipad/.test(ua)) {
      UI.toast('Tap Share → "Add to Home Screen" in Safari', false);
    } else if (/android/.test(ua)) {
      UI.toast('Tap ⋮ menu → "Add to Home Screen" in Chrome', false);
    } else {
      UI.toast('Click the install icon in the address bar ↑', false);
    }
  }
}

document.getElementById('pwa-install-btn')?.addEventListener('click', triggerInstall);
document.getElementById('install-top-btn')?.addEventListener('click', triggerInstall);
document.getElementById('pwa-dismiss')?.addEventListener('click', () => {
  document.getElementById('pwa-banner')?.classList.remove('show');
  localStorage.setItem('as_pwa_dismissed', Date.now().toString());
});

// Offline indicator
window.addEventListener('online',  () => document.getElementById('offline-bar')?.classList.remove('show'));
window.addEventListener('offline', () => { document.getElementById('offline-bar')?.classList.add('show'); UI.toast('You are offline — app still works!'); });

// Handle start_url params
(function() {
  const p = new URLSearchParams(window.location.search);
  const lang = p.get('lang');
  if (lang && LANGS[lang]) setTimeout(() => App.enterLang(lang), 400);
})();
